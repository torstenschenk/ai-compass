scripts:
  # variables (replace these placeholders with your actual values)
  # You can run these commands via `rav run <command-name>`

  # --- Docker Authenticate ---
  docker-auth: gcloud auth configure-docker europe-west10-docker.pkg.dev

  # --- Frontend Docker Commands ---
  build-frontend: docker build -t europe-west10-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO/ai-compass:latest app/frontend/
  push-frontend: docker push europe-west10-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO/ai-compass:latest

  # --- Backend Docker Commands ---
  # Note: Context is set to 'app' so it can access app/requirements.txt
  build-backend: docker build -f app/backend/Dockerfile -t europe-west10-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO/ai-compass-backend:latest app/
  push-backend: docker push europe-west10-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO/ai-compass-backend:latest

  # --- Combined ---
  build-all: rav run build-frontend && rav run build-backend
  push-all: rav run push-frontend && rav run push-backend
  deploy-all: rav run build-all && rav run push-all
